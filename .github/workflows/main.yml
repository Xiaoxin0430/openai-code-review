name: Run Java Git Diff By Local

on:
  push:
    branches:
      - master-close
  pull_request:
    branches:
      - master-close

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Run Java code
        run: |
          cd openai-code-review-sdk/src/main/java
          javac cn/xx/sdk/OpenAiCodeReview.java
          java cn.xx.sdk.OpenAiCodeReview
